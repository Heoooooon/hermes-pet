<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>펫 설정</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: transparent;
        user-select: none;
        -webkit-user-select: none;
        font-family: -apple-system, "Apple SD Gothic Neo", sans-serif;
      }
      #card {
        display: flex;
        flex-direction: column;
        height: 100%;
        border-radius: 14px;
        background: rgba(22, 22, 28, 0.94);
        color: #eee;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px 10px;
        cursor: grab;
      }
      header h1 {
        font-size: 14px;
        font-weight: 700;
      }
      #close {
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: #ddd;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        font-size: 12px;
        cursor: pointer;
        line-height: 1;
      }
      #close:hover {
        background: rgba(220, 60, 80, 0.9);
        color: #fff;
      }
      main {
        flex: 1;
        padding: 2px 14px 10px;
        display: flex;
        flex-direction: column;
        gap: 11px;
      }
      .row label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #bbb;
        margin-bottom: 4px;
      }
      .row output {
        color: #fff;
        font-variant-numeric: tabular-nums;
      }
      input[type="range"] {
        width: 100%;
        accent-color: #ff8a3d;
      }
      .seg {
        display: flex;
        gap: 6px;
      }
      .seg button {
        flex: 1;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        padding: 6px 0;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.06);
        color: #ccc;
        cursor: pointer;
      }
      .seg button.active {
        background: #ff8a3d;
        border-color: #ff8a3d;
        color: #1b1b20;
        font-weight: 700;
      }
      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12.5px;
        color: #ddd;
        padding: 2px 0;
      }
      .toggle input {
        appearance: none;
        width: 36px;
        height: 21px;
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.16);
        position: relative;
        cursor: pointer;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      .toggle input:checked {
        background: #ff8a3d;
      }
      .toggle input::after {
        content: "";
        position: absolute;
        top: 2.5px;
        left: 2.5px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        transition: transform 0.15s;
      }
      .toggle input:checked::after {
        transform: translateX(15px);
      }
      footer {
        padding: 0 14px 12px;
      }
      #reset {
        width: 100%;
        border: none;
        border-radius: 8px;
        padding: 7px 0;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.1);
        color: #ccc;
        cursor: pointer;
      }
      #reset:hover {
        background: rgba(255, 255, 255, 0.18);
      }
      hr {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <div id="card">
      <header id="drag">
        <h1>🐾 펫 설정</h1>
        <button id="close" title="닫기">✕</button>
      </header>
      <main>
        <div class="row">
          <label>캐릭터</label>
          <div id="packs" class="seg">
            <button type="button" data-pack="simeong">🐶 시멍</button>
            <button type="button" data-pack="hermes">🎧 헤르메스</button>
          </div>
        </div>
        <div class="row">
          <label>크기 <output id="size-out"></output></label>
          <input id="size" type="range" min="50" max="120" step="5" />
        </div>
        <div class="row">
          <label>걷는 속도 <output id="speed-out"></output></label>
          <input id="speed" type="range" min="50" max="200" step="10" />
        </div>
        <div class="row">
          <label>활동성 (돌아다니는 빈도) <output id="activity-out"></output></label>
          <input id="activity" type="range" min="30" max="300" step="10" />
        </div>
        <div class="row">
          <label>로켓·제트 묘기 빈도 <output id="stunts-out"></output></label>
          <input id="stunts" type="range" min="0" max="200" step="10" />
        </div>
        <hr />
        <label class="toggle">
          모니터 사이 넘나들기
          <input id="crossMonitors" type="checkbox" />
        </label>
        <label class="toggle">
          iPad로 건너가기 (Lanbeam)
          <input id="ipadHandoff" type="checkbox" />
        </label>
      </main>
      <footer>
        <button id="reset">기본값으로 되돌리기</button>
      </footer>
    </div>
    <script type="module" src="/src/settings.ts"></script>
  </body>
</html>
